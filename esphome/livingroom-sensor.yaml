esphome:
  name: livingroom-sensor
  friendly_name: Living Room Sensor

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Living Room Sensor Fallback"
    password: "fallback123"

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:

i2c:
  sda: GPIO6
  scl: GPIO7
  scan: true

sensor:
  - platform: scd4x
    co2:
      name: "Living Room CO2"
      id: livingroom_co2
    temperature:
      name: "Living Room Temperature"
      id: livingroom_temp
      filters:
        - offset: -2.0  # Self-heating compensation — fine-tune after comparing to a reference thermometer
    humidity:
      name: "Living Room Humidity"
      id: livingroom_humidity
    address: 0x62
    update_interval: 60s

light:
  - platform: status_led
    name: "Status LED"
    pin:
      number: GPIO8
      inverted: true

homeassistant:
  name: Home
  unit_system: imperial
  time_zone: America/Los_Angeles

logger:
  default: warning

# InfluxDB v2 integration — writes air quality sensor data to time-series storage.
# Prerequisite: create an API token in InfluxDB (Load Data → API Tokens → All Access)
# and paste it below.
influxdb:
  api_version: 2
  host: localhost
  port: 8086
  token: YOUR_INFLUXDB_API_TOKEN  # Replace with your token from the InfluxDB UI
  organization: home
  bucket: air_quality
  include:
    entity_globs:
      - sensor.*_co2
      - sensor.*_temperature
      - sensor.*_humidity
      - sensor.*_voc_index
      - sensor.*_power          # Sonoff S31 wattage via Tasmota MQTT
      - sensor.*_energy         # Sonoff S31 energy (kWh) via Tasmota MQTT
      - sensor.openweathermap_* # Outdoor air quality from OpenWeatherMap integration

# Shell commands for wall screen night mode.
# Requires the HA process user to be in the 'video' group:
#   sudo usermod -aG video pi
# Then restart Home Assistant for the change to take effect.
shell_command:
  screen_off: "vcgencmd display_power 0"
  screen_on: "vcgencmd display_power 1"

# Derivative sensors — compute CO₂ rate of change (ppm/min) per room.
# Used by rapid-rise alert automations. Restart HA after adding these.
sensor:
  - platform: derivative
    name: "Bedroom CO2 Rate"
    unique_id: bedroom_co2_rate
    source: sensor.bedroom_co2
    time_window: "00:10:00"
    unit_time: min
    round: 1

  - platform: derivative
    name: "Living Room CO2 Rate"
    unique_id: livingroom_co2_rate
    source: sensor.livingroom_co2
    time_window: "00:10:00"
    unit_time: min
    round: 1

  - platform: derivative
    name: "Kitchen CO2 Rate"
    unique_id: kitchen_co2_rate
    source: sensor.kitchen_co2
    time_window: "00:10:00"
    unit_time: min
    round: 1

  # Statistics sensors — track daily peak CO₂ per room.
  # Used by the daily summary notification automation.
  - platform: statistics
    name: "Bedroom CO2 Daily Max"
    unique_id: bedroom_co2_daily_max
    entity_id: sensor.bedroom_co2
    state_characteristic: max_value
    max_age:
      hours: 24
    sampling_size: 1440  # one reading per minute × 24h

  - platform: statistics
    name: "Living Room CO2 Daily Max"
    unique_id: livingroom_co2_daily_max
    entity_id: sensor.livingroom_co2
    state_characteristic: max_value
    max_age:
      hours: 24
    sampling_size: 1440

  - platform: statistics
    name: "Kitchen CO2 Daily Max"
    unique_id: kitchen_co2_daily_max
    entity_id: sensor.kitchen_co2
    state_characteristic: max_value
    max_age:
      hours: 24
    sampling_size: 1440

  # History stats sensors — track how long purifiers ran today.
  # Used by the daily summary notification automation.
  - platform: history_stats
    name: "Kitchen Purifier Runtime Today"
    unique_id: kitchen_purifier_runtime_today
    entity_id: switch.kitchen_purifier
    state: "on"
    type: time
    start: "{{ now().replace(hour=0, minute=0, second=0, microsecond=0) }}"
    end: "{{ now() }}"

  - platform: history_stats
    name: "Living Room Purifier Runtime Today"
    unique_id: living_room_purifier_runtime_today
    entity_id: switch.living_room_purifier
    state: "on"
    type: time
    start: "{{ now().replace(hour=0, minute=0, second=0, microsecond=0) }}"
    end: "{{ now() }}"
